<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Layer Proposal</title>
    <style>
        /* All your styling is now inside the HTML file */
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1e293b; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 500px; text-align: center; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; position: relative; }
        .progress-bar::before { content: ""; background: #e2e8f0; height: 4px; width: 100%; position: absolute; top: 50%; transform: translateY(-50%); z-index: 1; }
        .progress-fill { background: var(--primary); height: 4px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 1; transition: 0.4s ease; width: 0%; }
        .dot { background: #fff; border: 3px solid #e2e8f0; width: 30px; height: 30px; border-radius: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.4s; }
        .dot.active { border-color: var(--primary); color: var(--primary); }
        .layer { display: none; min-height: 200px; }
        .layer.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btns { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; }
        button { padding: 0.6rem 1.5rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #e2e8f0; color: #475569; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
            <div class="dot active">1</div>
            <div class="dot">2</div>
            <div class="dot">3</div>
            <div class="dot">4</div>
        </div>

        <div class="layer active">
            <h2>Executive Summary</h2>
            <p>Welcome! This is the first layer of your professional proposal.</p>
        </div>

        <div class="layer">
            <h2>Strategy</h2>
            <p>We focus on high-quality delivery and creative design solutions.</p>
        </div>

        <div class="layer">
            <h2>Pricing</h2>
            <table>
                <tr><th>Service</th><th>Total</th></tr>
                <tr><td>Web Design</td><td>$1,200</td></tr>
            </table>
        </div>

        <div class="layer">
            <h2>Ready to Start?</h2>
            <p>Click below to finalize the agreement.</p>
            <button class="btn-next" style="background: #10b981;">Accept Proposal</button>
        </div>

        <div class="nav-btns">
            <button class="btn-prev" id="prevBtn" disabled>Previous</button>
            <button class="btn-next" id="nextBtn">Next Layer</button>
        </div>
    </div>

    <script>
        const layers = document.querySelectorAll('.layer');
        const dots = document.querySelectorAll('.dot');
        const fill = document.getElementById('fill');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        let step = 0;

        nextBtn.addEventListener('click', () => {
            if (step < layers.length - 1) {
                step++;
                updateUI();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (step > 0) {
                step--;
                updateUI();
            }
        });

        function updateUI() {
            layers.forEach((l, i) => l.classList.toggle('active', i === step));
            dots.forEach((d, i) => d.classList.toggle('active', i <= step));
            fill.style.width = (step / (layers.length - 1)) * 100 + '%';
            
            prevBtn.disabled = step === 0;
            if (step === layers.length - 1) {
                nextBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
