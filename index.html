<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message For You</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            position: relative;
        }

        h1 { color: #d63384; margin-bottom: 1rem; }
        p { color: #555; font-size: 1.2rem; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
        }

        .hidden { display: none; }

        .heart { color: #ff4d6d; font-size: 50px; }
    </style>
</head>
<body>

    <div id="layer1" class="container">
        <h1>Hlo Namasthe Bro...</h1>
        <p>I've been thinking a lot to ask a  question?</p>
        <div class="buttons">
            <button onclick="nextLayer(1, 2)">Are You Ready!</button>
        </div>
    </div>

    <div id="layer2" class="container hidden">
        <h1>Appulu ekkuva aynay ra.</h1>
        <p>Do you feel the same way?</p>
        <div class="buttons">
            <button onclick="nextLayer(2, 3)">Yes, I do!</button>
        </div>
    </div>

    <div id="layer3" class="container hidden">
        <div class="heart">❤️</div>
        <h1>Tagudama?</h1>
        <p>mana Budget Ki Manchineelle.</p>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">YES!</button>
            <button id="noBtn" onmouseover="moveNoButton()">No</button>
        </div>
    </div>

    <div id="final" class="container hidden">
        <h1>🎉 HE SAID YES! 🎉</h1>
        <p>I can't wait to star together.</p>
        <div class="heart">💍👩‍❤️‍👨✨</div>
    </div>

    <script>
        function nextLayer(current, next) {
            document.getElementById('layer' + current).classList.add('hidden');
            document.getElementById('layer' + next).classList.remove('hidden');
        }

        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            // Generate random positions within the viewport
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('layer3').classList.add('hidden');
            document.getElementById('final').classList.remove('hidden');
            // Change background to something more festive
            document.body.style.backgroundColor = "#ffc8dd";
            alert("The best decision ever! ❤️");
        }
    </script>
</body>
</html>
